name: Release

# Cắt một bản release bằng cách đẩy tag dạng `vX.Y.Z`:
#     git tag v0.1.0 && git push origin v0.1.0
# Workflow build binary cho x86_64 + aarch64 rồi đính kèm vào GitHub Release.
# Có thể chạy tay qua "Run workflow" (workflow_dispatch) để thử nghiệm.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag để release (ví dụ v0.1.0)"
        required: true

# Cần quyền ghi để tạo/cập nhật Release.
permissions:
  contents: write

# Mỗi tag chỉ chạy một release tại một thời điểm.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Build trên 22.04 (glibc 2.35) để binary chạy được trên nhiều bản phân phối.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5

      - name: Cài target Rust
        run: rustup target add ${{ matrix.target }}

      # pinakey-core/zbus/x11rb đều là Rust thuần, nên aarch64 chỉ cần linker chéo,
      # không cần sysroot thư viện C của target.
      - name: Cài linker chéo (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} -p pinakey

      - name: Đóng gói asset (binary + checksum)
        run: |
          install -D -m0755 "target/${{ matrix.target }}/release/pinakey" \
            "dist/pinakey-${{ matrix.arch }}"
          ( cd dist && sha256sum "pinakey-${{ matrix.arch }}" > "pinakey-${{ matrix.arch }}.sha256" )

      - uses: actions/upload-artifact@v7
        with:
          name: pinakey-${{ matrix.arch }}
          path: dist/*

  release:
    name: Tạo GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Tải các artifact đã build
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Icon được đính kèm để trình cài 1 dòng tải về cùng binary.
      - name: Thêm icon vào release
        run: cp tools/icons/vi.svg dist/vi.svg

      - name: Xác định tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Tạo / cập nhật Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: PinaKey ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/pinakey-x86_64
            dist/pinakey-x86_64.sha256
            dist/pinakey-aarch64
            dist/pinakey-aarch64.sha256
            dist/vi.svg
          body: |
            ## Cài đặt nhanh (Linux / IBus)

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install-online.sh | bash
            ```

            Lệnh trên tự nhận diện CPU (x86_64 / aarch64), tải binary đúng kiến trúc,
            đăng ký engine với IBus và thêm PinaKey vào nguồn nhập GNOME.

            Gỡ cài đặt:

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install-online.sh | bash -s -- --uninstall
            ```
