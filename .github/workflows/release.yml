name: Release

# Cắt một bản release bằng cách đẩy tag dạng `vX.Y.Z`:
#     git tag v0.1.0 && git push origin v0.1.0
# Workflow build gói .deb (addon fcitx5) rồi đính kèm vào GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag để release (ví dụ v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Xác định tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # #104: chặn release lệch version — tag vX.Y.Z phải khớp workspace.package.version trong
      # Cargo.toml (nguồn version duy nhất; version của .deb do CMake đọc thẳng từ đây, còn tên
      # release lấy từ tag — lệch nhau là xuất bản "vX.Y.Z" đính kèm gói version cũ).
      - name: Kiểm tag khớp version Cargo.toml
        run: |
          tag="${{ steps.tag.outputs.name }}"
          # Trích version cùng cách với tools/check-versions.sh (chịu được khoảng trắng/comment).
          cargo_ver="$(grep -m1 -oP '^\s*version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Cargo.toml)"
          # So NGUYÊN TAG với "v<version>" — workflow_dispatch có thể nhập tag thiếu tiền tố v.
          if [ "$tag" != "v$cargo_ver" ]; then
            echo "::error::Tag '$tag' không khớp version trong Cargo.toml ('$cargo_ver'). Bump workspace.package.version (và PKGBUILD/flake.nix theo tools/check-versions.sh) rồi tag lại."
            exit 1
          fi
          echo "Tag $tag khớp Cargo.toml $cargo_ver ✓"

      # Cài Rust toolchain tường minh (lõi Rust build qua cargo bên trong CMake) — không phụ thuộc
      # ngầm vào việc image runner có sẵn Rust, để build release lúc cắt tag không bất ngờ gãy.
      - name: Cài Rust toolchain
        run: rustup show || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Cài phụ thuộc build fcitx5
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ extra-cmake-modules pkg-config dpkg-dev \
            fcitx5 fcitx5-modules-dev libfcitx5core-dev libfcitx5utils-dev libfcitx5config-dev

      - name: Cấu hình + build addon
        run: |
          cmake -S fcitx5 -B fcitx5/build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr -DPINAKEY_BUILD_TESTS=OFF
          cmake --build fcitx5/build

      - name: Đóng gói .deb
        run: |
          ( cd fcitx5/build && cpack -G DEB )
          mkdir -p dist
          cp fcitx5/build/*.deb dist/ || true
          ( cd dist && for f in *.deb; do sha256sum "$f" > "$f.sha256"; done )

      - name: Tạo / cập nhật Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: PinaKey ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.sha256
          body: |
            ## Cài đặt (fcitx5)

            Tải gói `.deb` bên dưới rồi:

            ```sh
            sudo apt install ./fcitx5-pinakey_*.deb
            fcitx5 -r -d
            ```

            Sau đó mở fcitx5-configtool → thêm input method **PinaKey** → Ctrl+Space → gõ Telex.

            Xem thêm [packaging/](https://github.com/${{ github.repository }}/tree/main/packaging)
            cho AUR (PKGBUILD) và Nix (flake.nix), hoặc build từ nguồn: `bash tools/install-fcitx5.sh`.
