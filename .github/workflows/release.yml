name: Release

# Cắt một bản release bằng cách đẩy tag dạng `vX.Y.Z`:
#     git tag v0.1.0 && git push origin v0.1.0
# Workflow build gói .deb (addon fcitx5) rồi đính kèm vào GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag để release (ví dụ v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build .deb (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Cài phụ thuộc build fcitx5
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ extra-cmake-modules pkg-config \
            fcitx5 fcitx5-modules-dev libfcitx5core-dev libfcitx5utils-dev libfcitx5config-dev

      - name: Cấu hình + build addon
        run: |
          cmake -S fcitx5 -B fcitx5/build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr -DPINAKEY_BUILD_TESTS=OFF
          cmake --build fcitx5/build

      - name: Đóng gói .deb
        run: |
          ( cd fcitx5/build && cpack -G DEB )
          mkdir -p dist
          cp fcitx5/build/*.deb dist/ || true
          ( cd dist && for f in *.deb; do sha256sum "$f" > "$f.sha256"; done )

      - name: Xác định tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Tạo / cập nhật Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: PinaKey ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.sha256
          body: |
            ## Cài đặt (fcitx5)

            Tải gói `.deb` bên dưới rồi:

            ```sh
            sudo apt install ./fcitx5-pinakey-*.deb
            fcitx5 -r -d
            ```

            Sau đó mở fcitx5-configtool → thêm input method **PinaKey** → Ctrl+Space → gõ Telex.

            Xem thêm [packaging/](https://github.com/${{ github.repository }}/tree/main/packaging)
            cho AUR (PKGBUILD) và Nix (flake.nix), hoặc build từ nguồn: `bash tools/install-fcitx5.sh`.
