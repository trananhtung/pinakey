# Quy tắc chọn transport theo ứng dụng (issue #67) — PinaKey tự chọn cách gõ tốt nhất
# cho từng app, người dùng không cần hiểu "preedit vs replace".
#
# Cú pháp: mỗi dòng `<transport> <mẫu-tên-chương-trình>`
#   - transport: preedit | replace | auto
#   - mẫu: so KHÔNG phân biệt hoa/thường với program()/wm_class — khớp khi bằng đúng
#     hoặc là chuỗi con (như danh sách loại trừ tiếng Anh #9).
# Dòng khớp SAU thắng dòng khớp trước. Thứ tự lớp: file này (nhúng trong binary)
# → /usr/share/pinakey/transport-rules.conf → ~/.config/pinakey/transport-rules.conf
# (rule người dùng thắng tất cả).

# LibreOffice/OpenOffice (#66): quảng cáo SurroundingText nhưng báo cáo lạc hậu/thiếu
# dấu cách khi gõ nhanh → diff xoá-chèn sai vùng. Luôn dùng preedit.
preedit soffice
preedit libreoffice

# Terminal: preedit là đường ổn định nhất; terminal nào có quảng cáo SurroundingText
# cũng không nên tin (đa số không có nên vốn đã rơi về preedit).
preedit gnome-terminal
preedit konsole
preedit xterm
preedit alacritty
preedit kitty
preedit wezterm
preedit tilix
preedit xfce4-terminal
preedit terminator
preedit urxvt
